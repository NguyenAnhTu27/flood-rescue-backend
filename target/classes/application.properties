# ==========================================
# Server
# ==========================================
spring.application.name=rescue-management
server.port=8080

# ==========================================
# MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/rescue_management_db\
  ?useSSL=false\
  &serverTimezone=Asia/Ho_Chi_Minh\
  &allowPublicKeyRetrieval=true\
  &characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==========================================
# Virtual Threads (Java 21)
# ==========================================
spring.threads.virtual.enabled=true

# ==========================================
# Session
# ==========================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=RESCUE_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ==========================================
# SQL init (chạy thủ công, không tự động)
# ==========================================
spring.sql.init.mode=never

# ==========================================
# Logging
# ==========================================
logging.level.com.swp391=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
