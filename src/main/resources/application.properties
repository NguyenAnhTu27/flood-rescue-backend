# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# DATASOURCE (MySQL)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/flood_rescue?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CONNECTION POOL (Hikari - default)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# JWT
app.jwt.secret=${JWT_SECRET:f9e8c4b2a1d7e6f5g4h3i2j1k9l8m7n6p5q4r3s2t1u}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# ===============================
# SEED DATA (DEV)
# ===============================
app.seed.enabled=${SEED_ENABLED:true}
app.seed.coordinator.email=${SEED_COORDINATOR_EMAIL:conchimcu@gmail.com}
app.seed.coordinator.phone=${SEED_COORDINATOR_PHONE:0900000002}
app.seed.coordinator.password=${SEED_COORDINATOR_PASSWORD:Anhtu2003}
app.seed.coordinator.full-name=${SEED_COORDINATOR_NAME:Dieu phoi vien mac dinh}

# ===============================
# UPLOAD
# ===============================
app.upload.rescue-dir=uploads/rescue
# Expose local uploads directory under /uploads/**
spring.web.resources.static-locations=classpath:/static/,file:uploads/

#size picture
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ===============================
# MAPBOX
# ===============================
mapbox.access-token=${MAPBOX_ACCESS_TOKEN:}