$kind: http-request
url: "{{base_url}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "conchimcu@gmail.com",
      "password": "Anhtu2003"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      pm.test('Has accessToken', () =>
      pm.expect(pm.response.json()).to.have.property('accessToken'));

      const token = pm.response.json().accessToken;

      if (token) pm.collectionVariables.set('coordinator_token', token);
order: 3000
