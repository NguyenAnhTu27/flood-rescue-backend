$kind: http-request
url: "{{base_url}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "testcitizen@gmail.com",
      "password": "WrongPass"
    }
scripts:
  - type: afterResponse
    code: pm.test('Status is 4xx for wrong credentials', () =>
      pm.expect(pm.response.code).to.be.oneOf([400, 401, 403]));
order: 4000
