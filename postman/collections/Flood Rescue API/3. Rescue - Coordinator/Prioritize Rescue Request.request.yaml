$kind: http-request
url: "{{base_url}}/api/rescue/coordinator/requests/{{request_id}}/priority"
method: PUT
headers:
  Content-Type: application/json
  Authorization: Bearer {{coordinator_token}}
body:
  type: text
  content: |-
    {
      "priority": "HIGH",
      "note": "Ưu tiên cao vì nhiều nạn nhân"
    }
scripts:
  - type: afterResponse
    code: pm.test('Status is 200', () => pm.response.to.have.status(200));
order: 4000
