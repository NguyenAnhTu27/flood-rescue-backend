$kind: http-request
url: "{{base_url}}/api/rescue/coordinator/requests?status=PENDING"
method: GET
headers:
  Authorization: Bearer {{coordinator_token}}
queryParams:
  status: PENDING
scripts:
  - type: afterResponse
    code: pm.test('Status is 200', () => pm.response.to.have.status(200));
order: 2000
