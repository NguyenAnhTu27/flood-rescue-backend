$kind: http-request
url: "{{base_url}}/api/rescue/coordinator/requests"
method: GET
headers:
  Authorization: Bearer {{coordinator_token}}
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      pm.test('Returns page object', () =>
      pm.expect(pm.response.json()).to.have.property('content'));
order: 1000
