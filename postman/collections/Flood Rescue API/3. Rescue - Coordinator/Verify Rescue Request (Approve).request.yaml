$kind: http-request
url: "{{base_url}}/api/rescue/coordinator/requests/{{request_id}}/verify"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{coordinator_token}}
body:
  type: text
  content: |-
    {
      "approved": true,
      "note": "Đã xác nhận, ưu tiên xử lý"
    }
scripts:
  - type: afterResponse
    code: pm.test('Status is 200', () => pm.response.to.have.status(200));
order: 3000
