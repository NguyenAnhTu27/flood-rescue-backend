$kind: http-request
url: "{{base_url}}/api/rescue/citizen/requests"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: text
  content: |-
    {
      "description": "Nhà bị ngập lũ, cần cứu hộ gấp!",
      "latitude": 16.0544,
      "longitude": 108.2022,
      "address": "123 Đường ABC, Đà Nẵng",
      "numberOfVictims": 3,
      "attachments": []
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      pm.test('Has id', () =>
      pm.expect(pm.response.json()).to.have.property('id'));

      const id = pm.response.json().id;

      if (id) pm.collectionVariables.set('request_id', id);
order: 1000
