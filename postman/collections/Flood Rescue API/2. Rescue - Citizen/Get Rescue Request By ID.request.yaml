$kind: http-request
url: "{{base_url}}/api/rescue/citizen/requests/{{request_id}}"
method: GET
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', () => pm.response.to.have.status(200));
      pm.test('Correct ID', () => pm.expect(String(pm.response.json().id)).to.equal(pm.collectionVariables.get('request_id')));
order: 3000
