$kind: http-request
url: "{{base_url}}/api/map/teams/locations"
method: GET
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      pm.test('Returns array', () =>
      pm.expect(pm.response.json()).to.be.an('array'));
order: 1000
